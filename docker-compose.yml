version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: tutorsys_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: tutorsys
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: tutorsys_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/tutorsys
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=root
      - spring.jpa.hibernate.ddl-auto=validate
      - spring.flyway.enabled=true
      - tutorsys.invoices.dir=/app/invoices
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - invoices_data:/app/invoices

  frontend:
    build: ./frontend
    container_name: tutorsys_frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
  invoices_data:
